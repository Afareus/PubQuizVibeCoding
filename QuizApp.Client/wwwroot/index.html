<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizApp.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="QuizApp.Client.styles.css" rel="stylesheet" />
    <style>
        /* Inline layout – bullet-proof, no caching/isolation issues */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #f0f4f8 0%, #dae3ed 100%);
        }

        .app-top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 4rem;
            height: 3.5rem;
            background-color: #003876;
            border-bottom: 2px solid #002a5c;
            backdrop-filter: blur(4px);
        }

        .app-home-link,
        .app-home-link:visited {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            font-weight: 600;
            color: #fff;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 999px;
            padding: 0.4rem 0.9rem;
            font-size: 0.95rem;
        }
        .app-home-link:hover { text-decoration: underline; color: #b3d4f0; }

        .app-page-content {
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            padding: 1.5rem 1rem 2rem;
            text-align: center;
        }

        /* Center all block children */
        .app-page-content h1,
        .app-page-content h2,
        .app-page-content h3,
        .app-page-content h4,
        .app-page-content h5,
        .app-page-content h6,
        .app-page-content p,
        .app-page-content .alert,
        .app-page-content .card,
        .app-page-content .card-body {
            text-align: center;
        }

        .app-page-content .d-flex {
            justify-content: center;
        }

        /* Tables stay left-aligned for readability */
        .app-page-content table,
        .app-page-content table th,
        .app-page-content table td {
            text-align: start;
        }

        /* Form labels stay left-aligned */
        .app-page-content .form-label,
        .app-page-content label {
            text-align: start;
            display: block;
        }

        .app-page-content ul,
        .app-page-content ol {
            padding-left: 0;
            list-style-position: inside;
        }

        .app-page-content .form-control,
        .app-page-content .form-select {
            text-align: center;
        }

        .app-page-content form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-page-content div.mb-3,
        .app-page-content div.mb-4 {
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        window.pubquiz = window.pubquiz || {};

        // Blur any currently focused interactive element.
        // Uses setTimeout so the blur happens AFTER the browser finishes its
        // own post-render focus assignment (Firefox and Safari assign focus
        // asynchronously after DOM mutations, so a synchronous blur is too early).
        window.pubquiz.blurAfterRender = function () {
            // First setTimeout pushes past Blazor's render; second pushes past
            // the browser's own focus-restoration that Firefox/Safari do after
            // a DOM mutation that removes the previously focused element.
            setTimeout(function () {
                setTimeout(function () {
                    try {
                        var el = document.activeElement;
                        if (el && el !== document.body && typeof el.blur === 'function') {
                            el.blur();
                        }
                    } catch (e) { /* swallow */ }
                }, 0);
            }, 0);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
